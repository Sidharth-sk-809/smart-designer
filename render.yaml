services:
  - type: web
    name: smart-designer-backend
    runtime: python
    pythonVersion: 3.13
    rootDir: backend
    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn backend_config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
    disk:
      name: smart-designer-data
      mountPath: /var/data
      sizeGB: 1
